name = "fahad-iptv-proxy"
main = "src/index.ts"
compatibility_date = "2024-04-01"

[env.production]
name = "fahad-iptv-proxy"
route = "https://fahad-iptv-proxy.*/api/*"
zone_id = "YOUR_ZONE_ID"

# Build configuration
[build]
command = "npm install && npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"
main = "./dist/index.js"
